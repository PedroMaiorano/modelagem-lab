name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências de build e do projeto
        run: |
          pip install build
          pip install -e .

      - name: Rodar testes antes de publicar
        # `requests` é dependência só de scraping/ (não faz parte do pacote
        # instalável -- não está em [tool.setuptools] packages), por isso
        # não entra em [project].dependencies; instalada aqui só pros testes.
        run: pip install pytest requests && pytest tests -x -q

      - name: Buildar sdist + wheel
        run: python -m build

      - name: Publicar wheel/sdist na Release da tag
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
